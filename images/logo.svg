<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Diamond behind key -->
  <rect x="30" y="20" width="42" height="42" rx="2" transform="rotate(45 51 41)" fill="#3d3842"/>
  <!-- Key rotated to match original logo orientation -->
  <g transform="rotate(-40 50 50)">
    <!-- Bow (outer ring) -->
    <circle cx="16" cy="50" r="13" stroke="#D4A247" stroke-width="5" fill="none"/>
    <!-- Bow hole -->
    <circle cx="16" cy="50" r="4.5" fill="#D4A247"/>
    <!-- Shaft -->
    <rect x="29" y="47" width="55" height="6" rx="2" fill="#D4A247"/>
    <!-- Teeth on upper edge of blade -->
    <rect x="54" y="38" width="5" height="9" fill="#D4A247"/>
    <rect x="62" y="36" width="6" height="11" fill="#D4A247"/>
    <rect x="71" y="38" width="5" height="9" fill="#D4A247"/>
    <rect x="79" y="40" width="5" height="7" fill="#D4A247"/>
  </g>
</svg>
